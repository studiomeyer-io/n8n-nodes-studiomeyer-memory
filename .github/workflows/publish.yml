name: Publish to npm with provenance

# Required for n8n Verified Community Nodes (effective May 1, 2026):
# https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/
#
# This workflow runs on every version tag push (v*.*.*) and publishes
# the package to npm with a provenance attestation. The provenance
# statement cryptographically links the published package to this
# GitHub Actions run, the source commit, and the workflow file —
# making the supply chain auditable.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
